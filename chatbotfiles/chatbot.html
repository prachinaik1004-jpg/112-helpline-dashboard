<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>112 Goa - AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./chatbot.css">
</head>
<body>
    <div class="chatbot-container">
        <!-- Header -->
        <header class="chatbot-header">
            <div class="header-left">
                <div class="logo">
                    <img src="https://c.ndtvimg.com/2019-10/uhi2a3eg_goapolice_625x300_09_October_19.jpg" alt="Goa Police" />
                    <span>112 AI Assistant</span>
                </div>
            </div>
            <div class="header-right">
                <div class="status-indicator">
                    <span class="status-dot online"></span>
                    <span>Online</span>
                </div>
                <button class="btn-minimize" onclick="toggleChatbot()">−</button>
            </div>
        </header>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="welcome-message">
                <div class="welcome-icon">🤖</div>
                <h3>Welcome to 112 AI Assistant</h3>
                <p>I can help you analyze emergency data, identify patterns, and provide insights for better emergency response.</p>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="sendQuickMessage('Show me today\'s emergency hotspots')">
                        🔥 Hotspots
                    </button>
                    <button class="quick-btn" onclick="sendQuickMessage('Analyze response time trends')">
                        ⏱️ Response Times
                    </button>
                    <button class="quick-btn" onclick="sendQuickMessage('What are the current high-priority alerts?')">
                        🚨 High Priority
                    </button>
                    <button class="quick-btn" onclick="sendQuickMessage('Generate a summary report')">
                        📊 Summary Report
                    </button>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Ask me about emergency data, patterns, or insights..." 
                       onkeypress="handleKeyPress(event)">
                <button class="btn-send" onclick="sendMessage()" id="sendBtn">
                    <span class="send-icon">➤</span>
                </button>
            </div>
            <div class="input-actions">
                <button class="action-btn" onclick="clearChat()">Clear Chat</button>
                <button class="action-btn" onclick="exportChat()">Export</button>
                <button class="action-btn" onclick="showContext()">Context</button>
            </div>
        </div>
    </div>

    <!-- Context Modal -->
    <div class="modal" id="contextModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>System Context</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="contextContent">
                <div class="loading">Loading context...</div>
            </div>
        </div>
    </div>

    <script src="./chatbot.js"></script>
</body>
</html>
