<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goa Risk Areas - 112 Analytics</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    .header {
      background: #0f5132;
      color: white;
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .map-container {
      flex: 1;
      position: relative;
      width: 100%;
      height: calc(100vh - 60px);
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <h1>112 Analytics - Risk Areas</h1>
    </header>
    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      try {
        // Initialize the map centered on Goa
        const map = L.map('map').setView([15.2993, 74.1240], 11);
        
        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
          maxZoom: 19
        }).addTo(map);
        
        // Add a marker
        L.marker([15.2993, 74.1240])
          .addTo(map)
          .bindPopup('Panjim, Goa')
          .openPopup();
          
        // Add scale control
        L.control.scale().addTo(map);
        
      } catch (error) {
        console.error('Error initializing map:', error);
        const mapContainer = document.getElementById('map');
        if (mapContainer) {
          mapContainer.innerHTML = `
            <div style="padding: 20px; color: #dc2626; background: #fef2f2; border-radius: 8px; margin: 20px;">
              <h3>Error loading map</h3>
              <p>Please check your internet connection and refresh the page.</p>
            </div>
          `;
        }
      }
    });
  </script>
</body>
</html>
